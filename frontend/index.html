<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCC Booking - Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <header class="bg-white/90 backdrop-blur border-b border-slate-200 sticky top-0 z-10">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-xl font-semibold">NCC Booking</h1>
        <a href="index.html" class="text-sm font-medium text-blue-600">Tours</a>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <section class="mb-8">
        <h2 class="text-3xl md:text-4xl font-bold tracking-tight">Discover Your Next Ride</h2>
        <p class="text-slate-600 mt-2">Choose from private tours and premium transfer services.</p>
      </section>

      <section>
        <div id="loading" class="text-slate-500">Loading tours...</div>
        <div id="error" class="hidden text-red-600"></div>
        <div id="tour-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </section>
    </main>

    <script>
      const API_BASE = "/api";
      const loadingEl = document.getElementById("loading");
      const errorEl = document.getElementById("error");
      const gridEl = document.getElementById("tour-grid");

      function renderTourCard(tour) {
        const image = tour.image_url || "https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=900&q=80";
        return `
          <article class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <img src="${image}" alt="${tour.title}" class="h-44 w-full object-cover" />
            <div class="p-5">
              <h3 class="text-lg font-semibold">${tour.title}</h3>
              <p class="text-slate-600 text-sm mt-2 line-clamp-3">${tour.description || "Premium transport experience."}</p>
              <div class="mt-4 flex items-center justify-between">
                <span class="text-blue-700 font-bold">€ ${Number(tour.price).toFixed(2)}</span>
                <a href="tour.html?id=${tour.id}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">View</a>
              </div>
            </div>
          </article>
        `;
      }

      async function loadTours() {
        try {
          const res = await fetch(`${API_BASE}/tours`);
          if (!res.ok) throw new Error("Unable to fetch tours");
          const tours = await res.json();
          gridEl.innerHTML = tours.map(renderTourCard).join("");
          if (!tours.length) {
            gridEl.innerHTML = '<p class="text-slate-500">No tours available right now.</p>';
          }
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.classList.remove("hidden");
        } finally {
          loadingEl.classList.add("hidden");
        }
      }

      loadTours();
    </script>
  </body>
</html>
